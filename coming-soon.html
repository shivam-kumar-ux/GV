<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyanoday Vidyalaya - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .animated-bg {
            background: linear-gradient(-45deg, #1e3a8a, #1e40af, #1d4ed8, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; left: 20%; animation-delay: 6s; }
        .particle:nth-child(3) { width: 100px; height: 100px; left: 70%; animation-delay: 12s; }
        .particle:nth-child(4) { width: 40px; height: 40px; left: 80%; animation-delay: 3s; }
        .particle:nth-child(5) { width: 70px; height: 70px; left: 90%; animation-delay: 9s; }
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        .content {
            z-index: 2;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white animated-bg relative overflow-hidden">
    
    <!-- Floating Particles Background -->
    <div class="floating-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main Content -->
    <div class="content text-center px-4 max-w-4xl mx-auto">
        <!-- Logo Placeholder -->
        <div class="mb-12">
            <img src="img/H_logo.png" alt="School Project Logo" class="mx-auto h-20 md:h-28 lg:h-36 w-auto drop-shadow-2xl">
        </div>
        
        <!-- Main Heading -->
        <h1 class="text-4xl md:text-6xl lg:text-7xl xl:text-8xl font-black bg-gradient-to-r from-white to-slate-200 bg-clip-text text-transparent mb-8 drop-shadow-2xl leading-tight">
            We Are
            <br class="sm:hidden">
            <span class="bg-gradient-to-r from-cyan-300 to-blue-300 bg-clip-text text-transparent">Coming</span>
            Soon
        </h1>
        
        <!-- Optional Subtext -->
        <p class="text-xl md:text-2xl lg:text-3xl font-light text-slate-200 mb-12 drop-shadow-lg max-w-2xl mx-auto leading-relaxed">
            Our school website is under construction. 
            <br>
            <span class="font-semibold text-cyan-300">Stay tuned for the launch!</span>
        </p>
    </div>

</body>
</html>
