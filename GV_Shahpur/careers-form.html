<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application - Gyanoday Vidyalaya</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2878EB 0%, #1e62b7 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p  { font-size: 1.2rem; opacity: 0.9; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 50px;
        }

        .section { margin-bottom: 40px; }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #2c3e50;
        }

        .section-header i {
            color: #2878EB;
            font-size: 1.5rem;
            margin-right: 15px;
            width: 30px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #34495e;
            font-size: 0.95rem;
        }

        .required { color: #e74c3c; }

        input, select, textarea {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafbfc;
            color: #2c3e50;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2878EB;
            box-shadow: 0 0 0 3px rgba(40,120,235,0.1);
            background: white;
        }

        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 15px center;
            background-repeat: no-repeat;
            background-size: 18px;
            padding-right: 50px;
        }

        textarea { resize: vertical; min-height: 120px; }

        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; margin-right: 0; }

        .upload-box {
            border: 2px dashed #bdc3c7;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
            position: relative;
        }

        .upload-box:hover { border-color: #2878EB; background: #f0f8ff; }
        .upload-box.has-file { border-color: #28a745; background: #f0fff4; }

        .upload-box i { font-size: 2.5rem; color: #95a5a6; margin-bottom: 10px; display: block; }
        .upload-box.has-file i { color: #28a745; }

        .upload-text  { font-weight: 500; color: #5a6c7d; margin-bottom: 4px; font-size: 0.9rem; }
        .upload-subtext { color: #95a5a6; font-size: 0.8rem; }

        .upload-box input[type="file"] {
            position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
            padding: 0;
        }

        /* Success / Error message */
        #formMessage {
            display: none;
            margin: 0 50px 30px;
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: center;
        }
        #formMessage.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        #formMessage.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Loading spinner inside button */
        .submit-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #8b5cf6 0%, #2878EB 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 auto 50px;
            min-width: 280px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(139,92,246,0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn i { font-size: 1.3rem; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .fa-spinner { animation: spin 1s linear infinite; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 30px; padding: 30px 20px; }
            .header { padding: 30px 20px; }
            .header h1 { font-size: 2rem; }
            body { padding: 10px; }
            .form-row { flex-direction: column; gap: 0; }
            #formMessage { margin: 0 20px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-briefcase"></i> Job Application</h1>
            <p>Join the Gyanoday Vidyalaya Team — Shape Young Minds</p>
        </div>

        <div id="formMessage"></div>

        <form id="applicationForm" novalidate>
        <div class="form-grid">

            <!-- ── LEFT COLUMN ── -->
            <div>
                <!-- Personal Information -->
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-user"></i> Personal Information
                    </div>
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" required placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" required placeholder="Enter last name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile <span class="required">*</span></label>
                        <input type="tel" id="mobile" name="mobile" required placeholder="+91 00000 00000">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" name="whatsapp" placeholder="+91 00000 00000 (if different)">
                    </div>
                </div>

                <!-- Professional Details -->
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-graduation-cap"></i> Professional Details
                    </div>
                    <div class="form-group">
                        <label for="category">Category <span class="required">*</span></label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option>Teaching</option>
                            <option>Administration</option>
                            <option>Maintenance</option>
                            <option>Counseling</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation <span class="required">*</span></label>
                        <select id="designation" name="designation" required>
                            <option value="">Select Designation</option>
                            <option>TGT Mathematics</option>
                            <option>Primary Teacher</option>
                            <option>Admissions Counselor</option>
                            <option>Facilities Supervisor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="experience">Experience <span class="required">*</span></label>
                        <select id="experience" name="experience" required>
                            <option value="">Select Experience</option>
                            <option>0-2 Years</option>
                            <option>2-5 Years</option>
                            <option>5-10 Years</option>
                            <option>10+ Years</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="lastSalary">Last Salary <span class="required">*</span></label>
                            <input type="number" id="lastSalary" name="lastSalary" placeholder="&#8377; 0" required min="0">
                        </div>
                        <div class="form-group">
                            <label for="expectedSalary">Expected Salary <span class="required">*</span></label>
                            <input type="number" id="expectedSalary" name="expectedSalary" placeholder="&#8377; 0" required min="0">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── RIGHT COLUMN ── -->
            <div>
                <!-- Application Details -->
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-file-alt"></i> Application Details
                    </div>
                    <div class="form-group">
                        <label for="applyFor">Apply For <span class="required">*</span></label>
                        <select id="applyFor" name="applyFor" required>
                            <option value="">Select Position</option>
                            <option>TGT Mathematics</option>
                            <option>Primary Teacher</option>
                            <option>Admissions Counselor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="howDidYouKnow">How did you know? <span class="required">*</span></label>
                        <select id="howDidYouKnow" name="howDidYouKnow" required>
                            <option value="">Select Source</option>
                            <option>Website</option>
                            <option>Facebook</option>
                            <option>Instagram</option>
                            <option>Referral</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" name="remarks" placeholder="Any additional information..."></textarea>
                    </div>
                </div>

                <!-- Documents -->
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-cloud-upload-alt"></i> Documents
                    </div>
                    <div class="form-row" style="gap:20px;">
                        <div class="form-group">
                            <label>Resume <span class="required">*</span></label>
                            <div class="upload-box" id="resumeBox">
                                <i class="fas fa-file-pdf"></i>
                                <div class="upload-text">Upload Resume</div>
                                <div class="upload-subtext">PDF, DOC (Max 2MB)</div>
                                <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Full Size Photo <span class="required">*</span></label>
                            <div class="upload-box" id="fullPhotoBox">
                                <i class="fas fa-image"></i>
                                <div class="upload-text">Upload Photo</div>
                                <div class="upload-subtext">JPG, PNG (Max 1MB)</div>
                                <input type="file" id="fullPhotoFile" accept="image/*" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-row" style="gap:20px;">
                        <div class="form-group">
                            <label>Passport Photo <span class="required">*</span></label>
                            <div class="upload-box" id="passportBox">
                                <i class="fas fa-id-card"></i>
                                <div class="upload-text">Passport Size Photo</div>
                                <div class="upload-subtext">JPG, PNG (Max 500KB)</div>
                                <input type="file" id="passportFile" accept="image/*" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Salary Proof (Optional)</label>
                            <div class="upload-box" id="salaryProofBox">
                                <i class="fas fa-receipt"></i>
                                <div class="upload-text">Upload Proof</div>
                                <div class="upload-subtext">Payslip / Bank Statement</div>
                                <input type="file" id="salaryProofFile" accept=".pdf,.jpg,.png">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── SUBMIT BUTTON ── -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i>
                Submit Application
            </button>

        </div>
        </form>
    </div>

    <script>
    // !! REPLACE THIS WITH YOUR DEPLOYED APPS SCRIPT WEB APP URL !!
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqtcgsbJWAdaxRyOBz8mEbcxfFjHJfuofZM7iHGtwvhpX52Zk2EGFiW8kzsREUqUooyw/exec';

    // ── Upload box: show file name when selected ──────────────
    var uploadBoxes = [
        { input: 'resumeFile',      box: 'resumeBox',      icon: 'fa-file-pdf' },
        { input: 'fullPhotoFile',   box: 'fullPhotoBox',   icon: 'fa-image' },
        { input: 'passportFile',    box: 'passportBox',    icon: 'fa-id-card' },
        { input: 'salaryProofFile', box: 'salaryProofBox', icon: 'fa-receipt' }
    ];

    uploadBoxes.forEach(function(ub) {
        var input = document.getElementById(ub.input);
        var box   = document.getElementById(ub.box);
        input.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                box.classList.add('has-file');
                box.querySelector('.upload-text').textContent    = this.files[0].name;
                box.querySelector('.upload-subtext').textContent = 'Click to change file';
            }
        });
    });

    // ── Read a file as base64 ─────────────────────────────────
    function readFileAsBase64(file) {
        return new Promise(function(resolve, reject) {
            if (!file) { resolve(null); return; }
            var reader = new FileReader();
            reader.onload  = function(e) { resolve(e.target.result); };
            reader.onerror = function()  { reject(new Error('Failed to read file')); };
            reader.readAsDataURL(file);
        });
    }

    // ── Show a message below the header ──────────────────────
    function showMessage(text, type) {
        var msg = document.getElementById('formMessage');
        msg.textContent  = text;
        msg.className    = type;   // 'success' or 'error'
        msg.style.display = 'block';
        msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ── Form submission ───────────────────────────────────────
    document.getElementById('applicationForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Basic validation
        var required = this.querySelectorAll('[required]');
        var allFilled = true;
        required.forEach(function(field) {
            if (!field.value.trim()) {
                field.style.borderColor = '#e74c3c';
                allFilled = false;
            } else {
                field.style.borderColor = '';
            }
        });

        if (!allFilled) {
            showMessage('Please fill in all required fields marked with *.', 'error');
            return;
        }

        // Disable button and show loading state
        var btn = document.getElementById('submitBtn');
        btn.disabled   = true;
        btn.innerHTML  = '<i class="fas fa-spinner"></i> Submitting...';

        try {
            // Read all files as base64
            var resumeFile      = document.getElementById('resumeFile').files[0];
            var fullPhotoFile   = document.getElementById('fullPhotoFile').files[0];
            var passportFile    = document.getElementById('passportFile').files[0];
            var salaryProofFile = document.getElementById('salaryProofFile').files[0];

            var resumeBase64      = await readFileAsBase64(resumeFile);
            var fullPhotoBase64   = await readFileAsBase64(fullPhotoFile);
            var passportBase64    = await readFileAsBase64(passportFile);
            var salaryProofBase64 = await readFileAsBase64(salaryProofFile);

            // Build the data object
            var payload = {
                firstName      : document.getElementById('firstName').value.trim(),
                lastName       : document.getElementById('lastName').value.trim(),
                email          : document.getElementById('email').value.trim(),
                mobile         : document.getElementById('mobile').value.trim(),
                whatsapp       : document.getElementById('whatsapp').value.trim(),
                category       : document.getElementById('category').value,
                designation    : document.getElementById('designation').value,
                experience     : document.getElementById('experience').value,
                lastSalary     : document.getElementById('lastSalary').value,
                expectedSalary : document.getElementById('expectedSalary').value,
                applyFor       : document.getElementById('applyFor').value,
                howDidYouKnow  : document.getElementById('howDidYouKnow').value,
                remarks        : document.getElementById('remarks').value.trim(),
                // Files
                resumeData      : resumeBase64,
                resumeName      : resumeFile      ? resumeFile.name      : null,
                fullPhotoData   : fullPhotoBase64,
                fullPhotoName   : fullPhotoFile   ? fullPhotoFile.name   : null,
                passportData    : passportBase64,
                passportName    : passportFile    ? passportFile.name    : null,
                salaryProofData : salaryProofBase64,
                salaryProofName : salaryProofFile ? salaryProofFile.name : null
            };

            // Send to Apps Script
            var response = await fetch(APPS_SCRIPT_URL, {
                method  : 'POST',
                headers : { 'Content-Type': 'text/plain' },
                body    : JSON.stringify(payload)
            });

            var result = await response.json();

            if (result.success) {
                showMessage(
                    'Application submitted successfully! We will contact you within 48 hours.',
                    'success'
                );
                document.getElementById('applicationForm').reset();
                // Reset upload boxes
                uploadBoxes.forEach(function(ub) {
                    var box = document.getElementById(ub.box);
                    box.classList.remove('has-file');
                    box.querySelector('.upload-text').textContent    = 'Upload File';
                    box.querySelector('.upload-subtext').textContent = '';
                });
                btn.innerHTML = '<i class="fas fa-check"></i> Submitted!';
            } else {
                throw new Error(result.message || 'Submission failed.');
            }

        } catch (err) {
            showMessage('Error: ' + err.message + ' Please try again or contact us directly.', 'error');
            btn.disabled  = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
        }
    });
    </script>
</body>
</html>
